<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 1. The text shown right beside the signature icon on the browser tab -->
<title>Silvana Moiceanu | AI & Business Consultant</title>

<meta name="description" content="Silvana Moiceanu. AI & Business Consultant, Forward Deployed Engineer, UC Berkeley MIMS.">

<!-- 2. The Signature Favicon (make sure file is named favicon.png in your main directory) -->
<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --paper: #e3ede7;
    --panel: #f5f9f6;
    --ink: #1c1f2b;
    --ink-soft: #55596a;
    --line: rgba(28,31,43,0.16);
    --line-strong: #1c1f2b;
    --plum: #4b3f72;
    --plum-deep: #372e58;
    --gold: #b8862f;
    --coral: #ff6f59;
    --focus: #2f6fed;
    --shadow-sm: 2px 2px 0 rgba(28,31,43,0.9);
    --shadow: 3px 3px 0 rgba(28,31,43,0.9);
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior: auto; }
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.62;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3{
    font-family: "Montserrat", system-ui, sans-serif;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 0;
  }

  a{ color: inherit; }
  img{ max-width: 100%; }

  .eyebrow{
    display: inline-block;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--plum);
    background: var(--panel);
    border: 1.5px solid var(--line-strong);
    border-radius: 999px;
    padding: 0.3rem 0.75rem;
    box-shadow: var(--shadow-sm);
  }

  /* Accessibility: skip link */
  .skip-link{
    position: absolute;
    left: 1rem;
    top: -3.5rem;
    background: var(--ink);
    color: var(--panel);
    padding: 0.6rem 1rem;
    border-radius: 8px;
    z-index: 100;
    transition: top 0.15s ease;
    text-decoration: none;
    font-family: "Montserrat", sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
  }
  .skip-link:focus{ top: 1rem; }

  :focus-visible{
    outline: 2.5px solid var(--focus);
    outline-offset: 3px;
    border-radius: 2px;
  }

  /* ===== Header ===== */
  header.site{
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 1.5rem;
    background: rgba(227,237,231,0.9);
    backdrop-filter: saturate(160%) blur(10px);
    border-bottom: 1.5px solid var(--line);
  }
  header.site .wordmark{
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    text-decoration: none;
    color: var(--ink);
  }
  header.site nav ul{
    list-style: none;
    display: flex;
    gap: 1.4rem;
    margin: 0;
    padding: 0;
  }
  header.site nav a{
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.8rem;
    text-decoration: none;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  header.site nav a:hover{ color: var(--plum); }
  @media (max-width: 660px){
    header.site nav a{ display: none; }
    header.site nav a:first-child, header.site nav a:last-child{ display: inline; }
  }

  main{ display:block; }

  section{
    padding: 5rem 1.5rem;
    max-width: 64rem;
    margin: 0 auto;
  }

  /* ===== Hero ===== */
  .hero{
    padding-top: 4rem;
    display: grid;
    grid-template-columns: 1.3fr 0.9fr;
    gap: 3rem;
    align-items: center;
  }
  .hero h1{
    font-size: clamp(2.5rem, 5.4vw, 4rem);
    line-height: 1.03;
    margin-top: 0.7rem;
  }
  .hero .role{
    margin-top: 1.15rem;
    font-size: 1.12rem;
    color: var(--ink-soft);
    max-width: 34rem;
  }
  .hero .role strong{ color: var(--ink); font-weight: 600; }

  .hero-actions{
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    margin-top: 2rem;
  }

  /* Chunky-but-quiet buttons */
  .btn{
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: "Montserrat", sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none;
    padding: 0.8rem 1.35rem;
    border-radius: 999px;
    border: 2px solid var(--line-strong);
    color: var(--ink);
    background: var(--panel);
    box-shadow: var(--shadow);
    transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
  }
  .btn:hover{ transform: translate(1.5px, 1.5px); box-shadow: 1.5px 1.5px 0 rgba(28,31,43,0.9); }
  .btn:active{ transform: translate(3px, 3px); box-shadow: 0 0 0 rgba(28,31,43,0.9); }
  .btn.primary{ background: var(--coral); color: #201410; border-color: var(--line-strong); }
  .btn.alt{ background: var(--gold); color: #201a08; }

  .portrait{
    position: relative;
    justify-self: center;
  }
  .portrait img{
    width: min(270px, 68vw);
    aspect-ratio: 1 / 1.08;
    object-fit: cover;
    border-radius: 10px;
    display: block;
    border: 2px solid var(--line-strong);
    position: relative;
    z-index: 1;
  }
  .portrait .frame{
    position: absolute;
    inset: 14px -14px -14px 14px;
    border: 2px solid var(--gold);
    border-radius: 10px;
    z-index: 0;
  }

  @media (max-width: 760px){
    .hero{ grid-template-columns: 1fr; }
    .portrait{ order: -1; justify-self: start; }
    .portrait .frame{ inset: 10px -10px -10px 10px; }
  }

  /* signature divider */
  .divider{
    max-width: 64rem;
    margin: 0 auto;
    padding: 0 1.5rem;
  }
  .divider svg{ width: 100%; height: 26px; display: block; }
  .divider path{
    fill: none;
    stroke: var(--gold);
    stroke-width: 1.5;
    stroke-linecap: round;
  }

  /* ===== Section headings ===== */
  .section-head{ margin-bottom: 2.25rem; }
  .section-head h2{ font-size: 1.85rem; margin-top: 0.5rem; }

  /* ===== Currently: role cards ===== */
  .roles{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.1rem;
  }
  @media (max-width: 760px){ .roles{ grid-template-columns: 1fr; } }

  .role-card{
    background: var(--panel);
    border: 1.5px solid var(--line-strong);
    border-radius: 10px;
    padding: 1.4rem;
    box-shadow: var(--shadow-sm);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .role-card:hover{ transform: translate(-1.5px, -1.5px); box-shadow: 3.5px 3.5px 0 rgba(28,31,43,0.9); }
  .role-card .org{
    font-family: "Montserrat", sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .role-card .org a{ text-decoration: none; border-bottom: 1.5px solid var(--line); }
  .role-card .org a:hover{ border-color: var(--plum); }
  .role-card .title{
    margin-top: 0.4rem;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.76rem;
    color: var(--plum);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ===== Timeline ===== */
  .timeline{
    position: relative;
    padding-left: 1.9rem;
    border-left: 1.5px solid var(--line);
  }
  .timeline-item{
    position: relative;
    padding-bottom: 2.1rem;
  }
  .timeline-item:last-child{ padding-bottom: 0; }
  .timeline-item::before{
    content: "";
    position: absolute;
    left: -2.14rem;
    top: 0.28rem;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--gold);
    border: 1.5px solid var(--line-strong);
  }
  .timeline-item .when{
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.74rem;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .timeline-item h3{ font-size: 1.15rem; margin-top: 0.35rem; }
  .timeline-item p{ margin: 0.4rem 0 0; color: var(--ink-soft); max-width: 40rem; }
  .timeline-item a{ text-decoration: underline; text-decoration-color: inherit; }
</style>
</head>
<body>

</body>
</html>
